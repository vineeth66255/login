<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Real-Time Fraud Detection in Online Employment Portals using Gemini 2.0 AI">
    <meta name="author" content="Venkata Sai Tamarapalli & Team">
    <!-- Forces the browser to use HTTPS for all resources -->
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>AI Model Metrics Presentation</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        zinc: { 850: '#1f1f22', 900: '#18181b', 950: '#09090b' },
                        brand: { 
                            blue: '#3b82f6',     
                            magenta: '#d946ef',  
                            violet: '#8b5cf6',   
                            emerald: '#10b981',  
                            rose: '#f43f5e'      
                        }
                    },
                    transitionTimingFunction: {
                        'spring': 'cubic-bezier(0.16, 1, 0.3, 1)',
                    },
                    animation: {
                        'float': 'float 3s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Hidden Scrollbars */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Elegant Custom Scrollbar */
        .slide-wrapper::-webkit-scrollbar { width: 6px; }
        .slide-wrapper::-webkit-scrollbar-track { background: transparent; }
        .slide-wrapper::-webkit-scrollbar-thumb { background: rgba(217, 70, 239, 0.3); border-radius: 10px; }
        .slide-wrapper::-webkit-scrollbar-thumb:hover { background: rgba(217, 70, 239, 0.6); }

        /* Snappy Pro Animations */
        .anim-fade-up, .anim-fade-down, .anim-fade, .anim-scale-up, .anim-slide-left, .anim-slide-right {
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Pro Text Blur Reveal */
        .anim-text-reveal {
            opacity: 0;
            filter: blur(12px);
            transform: translateY(20px);
            transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), 
                        filter 1s cubic-bezier(0.16, 1, 0.3, 1), 
                        transform 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Inactive States */
        .slide-wrapper:not(.is-active) .anim-fade-up { opacity: 0; transform: translateY(30px); }
        .slide-wrapper:not(.is-active) .anim-fade-down { opacity: 0; transform: translateY(-30px); }
        .slide-wrapper:not(.is-active) .anim-fade { opacity: 0; }
        .slide-wrapper:not(.is-active) .anim-scale-up { opacity: 0; transform: scale(0.90); }
        .slide-wrapper:not(.is-active) .anim-slide-left { opacity: 0; transform: translateX(-40px); }
        .slide-wrapper:not(.is-active) .anim-slide-right { opacity: 0; transform: translateX(40px); }

        /* Active States */
        .slide-wrapper.is-active .anim-fade-up,
        .slide-wrapper.is-active .anim-fade-down,
        .slide-wrapper.is-active .anim-slide-left,
        .slide-wrapper.is-active .anim-slide-right { opacity: 1; transform: translate(0, 0); }
        .slide-wrapper.is-active .anim-fade { opacity: 1; }
        .slide-wrapper.is-active .anim-scale-up { opacity: 1; transform: scale(1); }
        .slide-wrapper.is-active .anim-text-reveal { opacity: 1; filter: blur(0); transform: translateY(0); }

        /* Delays */
        .delay-100 { transition-delay: 100ms; } .delay-200 { transition-delay: 200ms; }
        .delay-300 { transition-delay: 300ms; } .delay-400 { transition-delay: 400ms; }
        .delay-500 { transition-delay: 500ms; } .delay-600 { transition-delay: 600ms; }
        .delay-700 { transition-delay: 700ms; } .delay-800 { transition-delay: 800ms; }
        .delay-900 { transition-delay: 900ms; } .delay-1000 { transition-delay: 1000ms; }
        .delay-1100 { transition-delay: 1100ms; } .delay-1200 { transition-delay: 1200ms; }

        /* Graph Animations */
        .anim-height { height: 0 !important; transition: height 1.2s cubic-bezier(0.16, 1, 0.3, 1) !important; }
        .slide-wrapper.is-active .anim-height { height: var(--target-height) !important; transition-delay: var(--delay, 0ms) !important; }
        
        .anim-width { width: 0 !important; transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1) !important; }
        .slide-wrapper.is-active .anim-width { width: var(--target-width) !important; transition-delay: var(--delay, 200ms) !important; }

        .anim-dash { stroke-dasharray: 0, 100 !important; transition: stroke-dasharray 1.5s cubic-bezier(0.16, 1, 0.3, 1) !important; }
        .slide-wrapper.is-active .anim-dash { stroke-dasharray: var(--dash-target), 100 !important; transition-delay: var(--delay, 0ms) !important; }

        .anim-path-draw { stroke-dasharray: 300; stroke-dashoffset: 300; transition: stroke-dashoffset 2s cubic-bezier(0.16, 1, 0.3, 1); }
        .slide-wrapper.is-active .anim-path-draw { stroke-dashoffset: 0; transition-delay: var(--delay, 0ms); }
        .anim-fill-fade { opacity: 0; transition: opacity 1.5s ease-out; }
        .slide-wrapper.is-active .anim-fill-fade { opacity: 1; transition-delay: var(--delay, 0ms); }

        @keyframes drawPathROC { from { stroke-dasharray: 0, 2000; } to { stroke-dasharray: 2000, 2000; } }
        .slide-wrapper.is-active .path-animation-roc { animation: drawPathROC 2s cubic-bezier(0.16, 1, 0.3, 1) forwards; animation-delay: 300ms; stroke-dasharray: 0, 2000; }
        
        /* Pro Text Gradients */
        .text-gradient-primary { background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-image: linear-gradient(to right, #3b82f6, #8b5cf6, #d946ef); }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-zinc-950 via-black to-zinc-950 text-slate-200 font-sans flex flex-col items-center justify-center overflow-hidden selection:bg-brand-magenta/40 p-4 md:p-8">

    <!-- Subtle Ambient Background -->
    <div class="fixed top-[-10%] left-[-5%] w-[40%] h-[40%] bg-brand-blue/15 rounded-full blur-[150px] pointer-events-none animate-pulse-slow"></div>
    <div class="fixed bottom-[-10%] right-[-5%] w-[40%] h-[40%] bg-brand-magenta/15 rounded-full blur-[150px] pointer-events-none animate-pulse-slow" style="animation-delay: 2s;"></div>

    <!-- Massive Pro Modal Container -->
    <div class="relative w-full w-[95vw] max-w-[1600px] h-[90vh] min-h-[700px] max-h-[1080px] bg-zinc-950/80 backdrop-blur-3xl border border-white/10 rounded-3xl shadow-[0_0_80px_-15px_rgba(217,70,239,0.25)] flex flex-col overflow-hidden">
        
        <!-- Header -->
        <div class="px-6 py-4 md:px-8 md:py-5 border-b border-white/5 flex justify-between items-center z-20 bg-zinc-950/50 shrink-0">
            <div class="flex items-center space-x-4 text-brand-blue shrink-0">
                <i data-lucide="shield-check" class="w-6 h-6 md:w-7 md:h-7"></i>
                <span class="font-bold tracking-[0.25em] uppercase text-xs md:text-sm text-white/90">AI Security Agent</span>
            </div>
            <div class="flex items-center space-x-4">
                <button id="audio-toggle-btn" onclick="toggleAudio()" class="p-2 md:p-2.5 bg-zinc-900 border border-white/10 rounded-full hover:bg-zinc-800 transition-colors shadow-lg group relative" title="Toggle Voice Track">
                    <span class="absolute -top-8 right-0 bg-black text-white text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">Voice Track</span>
                    <i data-lucide="volume-x" class="w-4 h-4 md:w-5 md:h-5 text-zinc-500"></i>
                </button>
                <div id="slide-title-display" class="text-zinc-400 font-medium tracking-wide text-xs md:text-sm truncate pl-2 text-right"></div>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="w-full h-[3px] bg-zinc-900 z-20 shrink-0">
            <div id="progress-fill" class="h-full bg-gradient-to-r from-brand-blue via-brand-violet to-brand-magenta transition-all duration-500 ease-out shadow-[0_0_15px_rgba(217,70,239,0.6)]" style="width: 0%"></div>
        </div>

        <!-- Dynamic Content Area -->
        <div id="slides-area" class="flex-1 relative w-full h-full overflow-hidden flex flex-col min-h-0">
            <!-- Slides Injected Here -->
        </div>

        <!-- Footer Navigation -->
        <div class="px-4 py-3 md:px-8 md:py-5 bg-zinc-950/90 border-t border-white/5 flex justify-between items-center z-20 shrink-0">
            <button id="btn-prev" onclick="prevSlide()" class="group px-4 py-2.5 md:px-6 md:py-3 rounded-xl flex items-center transition-all duration-300 text-zinc-300 bg-zinc-900 border border-white/5 hover:bg-zinc-800 hover:border-white/10 text-xs md:text-sm font-bold tracking-wide">
                <i data-lucide="chevron-left" class="w-4 h-4 mr-2 group-hover:-translate-x-1 transition-transform"></i>
                <span class="hidden sm:inline">Previous</span>
            </button>
            
            <!-- Dots -->
            <div id="dots-container" class="flex space-x-2 md:space-x-3 overflow-x-auto max-w-[50%] md:max-w-xl px-4 hide-scrollbar items-center py-2">
                <!-- Dots injected via JS -->
            </div>

            <button id="btn-next" onclick="nextSlide()" class="group px-4 py-2.5 md:px-6 md:py-3 rounded-xl flex items-center transition-all duration-300 text-white bg-white/10 border border-white/10 hover:bg-white/20 hover:shadow-[0_0_25px_rgba(217,70,239,0.3)] text-xs md:text-sm font-bold tracking-wide">
                <span class="hidden sm:inline">Next</span>
                <i data-lucide="chevron-right" class="w-4 h-4 ml-2 group-hover:translate-x-1 transition-transform"></i>
            </button>
        </div>
    </div>

    <script>
        // --- PROPORTIONAL COMPONENT TEMPLATES (UPSCALED TEXT) ---
        const CodeEditor = (filename, lines, delay = 300) => `
            <div class="anim-scale-up rounded-2xl overflow-hidden bg-[#09090b] border border-white/10 shadow-2xl w-full delay-${delay} max-h-full flex flex-col">
                <div class="px-4 py-3 bg-[#18181b] border-b border-white/5 flex items-center space-x-3 shrink-0">
                    <div class="flex space-x-2 shrink-0">
                        <div class="w-3 h-3 rounded-full bg-zinc-700"></div>
                        <div class="w-3 h-3 rounded-full bg-zinc-700"></div>
                        <div class="w-3 h-3 rounded-full bg-zinc-700"></div>
                    </div>
                    <span class="ml-4 text-xs md:text-sm font-mono text-zinc-400 flex items-center justify-center w-full pr-8 tracking-wide">
                        <i data-lucide="file-code" class="w-4 h-4 mr-2 text-brand-magenta"></i> ${filename}
                    </span>
                </div>
                <div class="p-5 md:p-6 font-mono text-sm md:text-base leading-relaxed overflow-y-auto overflow-x-auto text-zinc-300 bg-[#09090b] flex-1 hide-scrollbar">
                    ${lines.map((line, i) => `
                        <div class="flex hover:bg-white/[0.03] px-2 py-0.5 rounded transition-colors">
                            <span class="w-8 text-zinc-600 select-none text-right mr-4 shrink-0">${i + 1}</span>
                            <div class="whitespace-pre">${line}</div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;

        const InfoCard = (icon, title, desc, color, glowColor, delay) => `
            <div class="anim-fade-up flex flex-col p-6 rounded-2xl border border-white/5 bg-zinc-900/50 backdrop-blur-xl hover:bg-zinc-800/50 hover:border-white/10 hover:shadow-[0_15px_40px_${glowColor}] transition-all duration-300 delay-${delay} h-full group">
                <div class="p-3 bg-[#09090b] rounded-xl w-fit mb-5 border border-white/5 group-hover:scale-110 transition-transform">
                    <i data-lucide="${icon}" class="w-8 h-8 ${color}"></i>
                </div>
                <h3 class="text-xl md:text-2xl font-bold text-white mb-3 tracking-wide anim-text-reveal delay-${delay + 100}">${title}</h3>
                <p class="text-zinc-400 text-sm md:text-base leading-relaxed anim-text-reveal delay-${delay + 200}">${desc}</p>
            </div>
        `;

        const DoughnutChart = (title, safePercent, delay) => `
            <div class="anim-fade-up delay-${delay} flex flex-col p-5 md:p-6 bg-zinc-900/50 rounded-2xl border border-white/5 h-full w-full justify-between hover:border-white/10 transition-colors">
                <h3 class="text-zinc-300 font-bold text-xs md:text-sm uppercase tracking-widest text-center mb-4 flex items-center justify-center anim-text-reveal"><i data-lucide="pie-chart" class="w-4 h-4 mr-2 text-brand-emerald"></i>${title}</h3>
                <div class="flex-1 flex flex-col items-center justify-center min-h-[140px]">
                    <div class="relative w-32 h-32 md:w-40 md:h-40">
                        <svg viewBox="0 0 36 36" class="w-full h-full transform -rotate-90 drop-shadow-2xl">
                            <path class="text-brand-rose/20" stroke-width="3" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path class="text-brand-emerald anim-dash" stroke-dasharray="0, 100" stroke-width="3" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" style="--dash-target: ${safePercent}; --delay: ${delay + 200}ms; stroke-linecap: round;" />
                        </svg>
                        <div class="absolute inset-0 flex flex-col items-center justify-center">
                            <span class="text-white font-black text-2xl md:text-3xl anim-text-reveal delay-${delay + 300}">${safePercent}%</span>
                            <span class="text-zinc-500 text-[9px] md:text-[10px] font-bold uppercase tracking-[0.25em] mt-1">Safe</span>
                        </div>
                    </div>
                </div>
                <div class="flex justify-center gap-5 mt-4 text-[10px] md:text-xs font-medium text-zinc-400 anim-text-reveal delay-${delay + 400}">
                    <span class="flex items-center"><div class="w-2 h-2 rounded-full bg-brand-emerald mr-2 shadow-[0_0_10px_rgba(16,185,129,0.8)]"></div> Safe</span>
                    <span class="flex items-center"><div class="w-2 h-2 rounded-full bg-brand-rose mr-2"></div> Fake</span>
                </div>
            </div>
        `;

        const BarChartVertical = (title, data, delay) => `
            <div class="anim-fade-up delay-${delay} flex flex-col p-5 md:p-6 bg-zinc-900/50 rounded-2xl border border-white/5 h-full w-full justify-between hover:border-white/10 transition-colors">
                <h3 class="text-zinc-300 font-bold text-xs md:text-sm uppercase tracking-widest text-center mb-4 flex items-center justify-center anim-text-reveal"><i data-lucide="bar-chart-2" class="w-4 h-4 mr-2 text-brand-blue"></i>${title}</h3>
                <div class="flex-1 flex items-end justify-around border-b border-l border-white/10 pb-2 pl-2 pt-8 min-h-[140px]">
                    ${data.map((d, i) => `
                        <div class="flex flex-col items-center w-full group h-full justify-end relative">
                            <span class="text-xs md:text-sm font-mono font-bold text-white mb-2 opacity-0 group-hover:opacity-100 transition-all absolute -top-6">${d.val}%</span>
                            <div class="w-full max-w-[35px] md:max-w-[45px] ${d.color} rounded-t-md anim-height relative shadow-[0_0_20px_${d.shadowColor}]" style="--target-height: ${d.val}%; --delay: ${delay + 200 + (i*150)}ms;">
                                <div class="absolute inset-0 bg-white/20 opacity-0 group-hover:opacity-100 transition-opacity rounded-t-md"></div>
                            </div>
                            <span class="text-[9px] md:text-xs text-zinc-400 font-medium mt-3 whitespace-nowrap text-center tracking-wide anim-text-reveal delay-${delay + 300}">${d.label}</span>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;

        const BarChartHorizontal = (title, data, delay) => `
            <div class="anim-fade-up delay-${delay} flex flex-col p-5 md:p-6 bg-zinc-900/50 rounded-2xl border border-white/5 h-full w-full justify-between hover:border-white/10 transition-colors">
                <h3 class="text-zinc-300 font-bold text-xs md:text-sm uppercase tracking-widest text-center mb-4 flex items-center justify-center anim-text-reveal"><i data-lucide="map-pin" class="w-4 h-4 mr-2 text-brand-magenta"></i>${title}</h3>
                <div class="flex-1 flex flex-col justify-center border-l border-b border-white/10 pb-2 pl-4 gap-5 pt-2 min-h-[140px]">
                    ${data.map((d, i) => `
                        <div class="flex flex-col w-full group relative">
                            <div class="flex justify-between text-xs md:text-sm font-medium text-zinc-400 mb-2 anim-text-reveal delay-${delay + 200 + (i*100)}">
                                <span class="tracking-wide">${d.label}</span>
                                <span class="font-mono text-white opacity-0 group-hover:opacity-100 transition-opacity">${d.val}%</span>
                            </div>
                            <div class="h-3 md:h-4 w-full bg-[#09090b] rounded-full overflow-hidden border border-white/5">
                                <div class="h-full ${d.color} anim-width relative shadow-[0_0_15px_${d.shadowColor}] rounded-full" style="--target-width: ${d.val}%; --delay: ${delay + 200 + (i*150)}ms;"></div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;

        const AreaChart = (title, delay) => `
            <div class="anim-fade-up delay-${delay} flex flex-col p-5 md:p-6 bg-zinc-900/50 rounded-2xl border border-white/5 h-full w-full justify-between hover:border-white/10 transition-colors">
                <h3 class="text-zinc-300 font-bold text-xs md:text-sm uppercase tracking-widest text-center mb-3 flex items-center justify-center anim-text-reveal"><i data-lucide="trending-up" class="w-4 h-4 mr-2 text-yellow-400"></i>${title}</h3>
                <div class="flex-1 relative border-b border-l border-white/10 mt-2 min-h-[140px]">
                    <svg preserveAspectRatio="none" viewBox="0 0 100 100" class="absolute inset-0 w-full h-full overflow-visible">
                        <line x1="0" y1="25" x2="100" y2="25" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="2 2" />
                        <line x1="0" y1="50" x2="100" y2="50" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="2 2" />
                        <line x1="0" y1="75" x2="100" y2="75" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="2 2" />
                        <path class="text-yellow-400 anim-path-draw drop-shadow-[0_0_12px_rgba(250,204,21,0.6)]" stroke-width="3" stroke="currentColor" fill="none" d="M0,90 Q15,85 25,60 T50,40 T75,20 T100,10" style="--delay: ${delay + 200}ms; stroke-linecap: round;"></path>
                        <path class="text-yellow-500/20 anim-fill-fade" fill="currentColor" d="M0,90 Q15,85 25,60 T50,40 T75,20 T100,10 L100,100 L0,100 Z" style="--delay: ${delay + 600}ms;"></path>
                    </svg>
                </div>
                <div class="flex justify-between text-[9px] md:text-xs font-bold text-zinc-500 mt-2 px-1 tracking-widest anim-text-reveal delay-${delay + 300}">
                    <span>MON</span><span>WED</span><span>FRI</span><span>SUN</span>
                </div>
            </div>
        `;

        const MetricRow = (icon, title, val, desc, color, delay) => `
            <div class="anim-fade-up delay-${delay} flex items-center justify-between p-5 md:p-6 rounded-2xl bg-zinc-900/50 border border-white/5 hover:bg-zinc-800/80 transition-colors group">
                <div class="flex items-center space-x-5">
                    <div class="p-3 bg-[#09090b] rounded-xl border border-white/5 group-hover:scale-110 transition-transform">
                        <i data-lucide="${icon}" class="w-6 h-6 ${color}"></i>
                    </div>
                    <div>
                        <h3 class="text-zinc-200 text-lg md:text-xl font-bold tracking-wide anim-text-reveal delay-${delay + 100}">${title}</h3>
                        <p class="text-zinc-500 text-xs md:text-sm mt-1 anim-text-reveal delay-${delay + 200}">${desc}</p>
                    </div>
                </div>
                <div class="text-3xl md:text-5xl font-black ${color} tracking-tight anim-text-reveal delay-${delay + 300}">${val}</div>
            </div>
        `;

        const MatrixCell = (title, count, desc, type, delay) => {
            const styles = {
                success: 'bg-brand-emerald/10 border-brand-emerald/30 text-brand-emerald shadow-[0_0_20px_rgba(16,185,129,0.15)]',
                success_scam: 'bg-brand-violet/10 border-brand-violet/30 text-brand-violet shadow-[0_0_20px_rgba(139,92,246,0.15)]',
                warning: 'bg-yellow-500/10 border-yellow-500/30 text-yellow-400 shadow-[0_0_20px_rgba(250,204,21,0.15)]',
                danger: 'bg-brand-rose/10 border-brand-rose/30 text-brand-rose shadow-[0_0_20px_rgba(244,63,94,0.15)]',
            };
            return `
                <div class="anim-scale-up p-5 md:p-8 rounded-2xl border backdrop-blur-xl flex flex-col justify-center items-center text-center hover:scale-[1.03] transition-transform ${styles[type]} delay-${delay}">
                    <div class="text-4xl md:text-6xl font-black mb-2 tracking-tighter drop-shadow-md">${count}</div>
                    <div class="font-bold text-xs md:text-sm mb-1 uppercase tracking-[0.2em] text-white">${title}</div>
                    <div class="text-[10px] md:text-xs opacity-80 font-medium tracking-wide">${desc}</div>
                </div>
            `;
        };

        // --- OPTIMIZED METRIC DEEP DIVE DASHBOARD COMPONENT ---
        const MetricDeepDive = (title, score, formula, desc, donutData, barData, compData, themeClass, shadowClass, delay) => `
            <div class="w-full flex flex-col justify-center max-w-[1200px] mx-auto h-full px-6 py-4">
                <div class="flex flex-col md:flex-row items-start md:items-center justify-between mb-8 md:mb-10 gap-6">
                    <div>
                        <h2 class="text-3xl md:text-5xl font-extrabold text-white tracking-tight flex items-center anim-text-reveal">
                            ${title} <span class="ml-4 px-3 py-1 rounded-full bg-white/5 ${themeClass} text-sm md:text-lg font-mono border border-white/10 shadow-[0_0_15px_${shadowClass}]">${score}</span>
                        </h2>
                        <p class="text-sm md:text-lg text-zinc-400 mt-3 max-w-2xl leading-relaxed anim-text-reveal delay-200">${desc}</p>
                    </div>
                    <div class="hidden lg:block text-right bg-zinc-900/50 p-4 rounded-xl border border-white/5 anim-scale-up delay-300">
                        <div class="text-[10px] text-zinc-500 uppercase tracking-widest mb-1.5 font-bold">Mathematical Formula</div>
                        <code class="text-sm font-mono text-zinc-300 font-bold">${formula}</code>
                    </div>
                </div>

        // --- CONTROLLER ---
        let currentSlide = 0;
        let isAnimating = false;
        
        // --- AUDIO CONTROLLER ---
        let isAudioEnabled = false;
        const synth = window.speechSynthesis;

        function toggleAudio() {
            isAudioEnabled = !isAudioEnabled;
            const btn = document.getElementById('audio-toggle-btn');
            
            if (isAudioEnabled) {
                btn.innerHTML = '<span class="absolute -top-8 right-0 bg-brand-emerald text-white text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">Voice Track On</span><i data-lucide="volume-2" class="w-4 h-4 md:w-5 md:h-5 text-brand-emerald"></i>';
                btn.classList.add('border-brand-emerald/50', 'bg-brand-emerald/10', 'shadow-[0_0_15px_rgba(16,185,129,0.3)]');
                lucide.createIcons();
                playCurrentSlideAudio();
            } else {
                btn.innerHTML = '<span class="absolute -top-8 right-0 bg-black text-white text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">Voice Track Off</span><i data-lucide="volume-x" class="w-4 h-4 md:w-5 md:h-5 text-zinc-500"></i>';
                btn.classList.remove('border-brand-emerald/50', 'bg-brand-emerald/10', 'shadow-[0_0_15px_rgba(16,185,129,0.3)]');
                lucide.createIcons();
                synth.cancel();
            }
        }

        function playCurrentSlideAudio() {
            synth.cancel(); // Stop any currently playing audio immediately
            if (!isAudioEnabled) return;
            
            // Wait for slide transition to finish before speaking
            setTimeout(() => {
                if (!isAudioEnabled) return;
                const text = slidesData[currentSlide].speechText;
                if (text) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.rate = 0.95; // Slightly slower pacing for presentation format
                    utterance.pitch = 1.0;
                    synth.speak(utterance);
                }
            }, 600);
        }

        // Cleanup audio if window closes
        window.addEventListener('beforeunload', () => { synth.cancel(); });

        function init() {
            const slidesArea = document.getElementById('slides-area');
            slidesArea.innerHTML = slidesData.map((slide, i) => `
                <div id="slide-${i}" class="slide-wrapper absolute inset-0 overflow-y-auto flex flex-col items-center justify-center transition-all duration-[800ms] ease-spring transform opacity-0 translate-x-full scale-95 z-0">
                    ${slide.html}
                </div>
            `).join('');

            const dotsContainer = document.getElementById('dots-container');
            dotsContainer.innerHTML = slidesData.map((_, i) => `
                <button onclick="goToSlide(${i})" id="dot-${i}" class="h-1.5 md:h-2 rounded-full transition-all duration-500 ease-out bg-zinc-700 w-1.5 md:w-2 hover:bg-zinc-500 shrink-0"></button>
            `).join('');

            lucide.createIcons();
            updateView();

            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
                if (e.key === 'ArrowLeft') prevSlide();
            });
        }

        function updateView() {
            slidesData.forEach((_, i) => {
                const el = document.getElementById(`slide-${i}`);
                if (i === currentSlide) {
                    el.className = 'slide-wrapper is-active absolute inset-0 overflow-y-auto flex flex-col items-center justify-center transition-all duration-[800ms] ease-spring transform opacity-100 translate-x-0 scale-100 z-10';
                    setTimeout(() => { el.scrollTop = 0; }, 50);
                } else if (i < currentSlide) {
                    el.className = 'slide-wrapper absolute inset-0 overflow-y-auto flex flex-col items-center justify-center transition-all duration-[800ms] ease-spring transform opacity-0 -translate-x-full scale-90 z-0';
                } else {
                    el.className = 'slide-wrapper absolute inset-0 overflow-y-auto flex flex-col items-center justify-center transition-all duration-[800ms] ease-spring transform opacity-0 translate-x-full scale-90 z-0';
                }
            });

            document.getElementById('progress-fill').style.width = `${((currentSlide + 1) / slidesData.length) * 100}%`;
            document.getElementById('slide-title-display').innerHTML = `${slidesData[currentSlide].title} <span class="text-zinc-600 mx-2 md:mx-3">|</span> ${currentSlide + 1}/${slidesData.length}`;

            slidesData.forEach((_, i) => {
                const dot = document.getElementById(`dot-${i}`);
                if (i === currentSlide) {
                    dot.className = 'h-1.5 md:h-2 rounded-full transition-all duration-500 ease-out bg-brand-blue w-5 md:w-6 shadow-[0_0_15px_rgba(59,130,246,0.6)] shrink-0';
                } else {
                    dot.className = 'h-1.5 md:h-2 rounded-full transition-all duration-500 ease-out bg-zinc-700 w-1.5 md:w-2 hover:bg-zinc-500 shrink-0';
                }
            });

            const btnPrev = document.getElementById('btn-prev');
            btnPrev.disabled = currentSlide === 0;
            btnPrev.style.opacity = currentSlide === 0 ? "0.5" : "1";
            btnPrev.style.cursor = currentSlide === 0 ? "not-allowed" : "pointer";

            const btnNext = document.getElementById('btn-next');
            btnNext.disabled = currentSlide === slidesData.length - 1;
            btnNext.style.opacity = currentSlide === slidesData.length - 1 ? "0.5" : "1";
            btnNext.style.cursor = currentSlide === slidesData.length - 1 ? "not-allowed" : "pointer";
            
            // Trigger voice track if enabled
            playCurrentSlideAudio();
        }

        function nextSlide() {
            if (currentSlide < slidesData.length - 1 && !isAnimating) {
                isAnimating = true;
                currentSlide++;
                updateView();
                setTimeout(() => isAnimating = false, 800);
            }
        }

        function prevSlide() {
            if (currentSlide > 0 && !isAnimating) {
                isAnimating = true;
                currentSlide--;
                updateView();
                setTimeout(() => isAnimating = false, 800);
            }
        }

        function goToSlide(index) {
            if (index !== currentSlide && !isAnimating) {
                isAnimating = true;
                currentSlide = index;
                updateView();
                setTimeout(() => isAnimating = false, 800);
            }
        }

        init();
    </script>
